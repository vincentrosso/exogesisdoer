# Mid-cap biotech universe for sprint scanning.
# Market cap roughly $1B–$20B as of early 2026.
# All use PaymentsToAcquirePropertyPlantAndEquipment unless capex_tag overrides.
# cik: field overrides ticker lookup for companies not in EDGAR company_tickers.json.
#
# Excluded (annotated below):
#   BLUE  — bankrupt/delisted March 2024
#   SAGE  — acquired by Biogen 2023
#   KRTX  — acquired by BMS early 2024
#   MRUS  — Merus N.V., Dutch company, 20-F filer, no quarterly XBRL
#   THTX  — Theratechnologies, Canadian, 20-F filer, no quarterly XBRL
#   SIGA  — XBRL data annual-only; no quarterly CapEx reported
#   PRTA  — only 2 XBRL entries from 2012-2013; no recent data

capex_tag_default: PaymentsToAcquirePropertyPlantAndEquipment


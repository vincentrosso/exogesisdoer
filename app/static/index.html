<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>doer — Sprint Manager</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --green:   #3fb950;
    --yellow:  #d29922;
    --red:     #f85149;
    --blue:    #58a6ff;
    --purple:  #bc8cff;
    --mono:    'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }

  /* ── layout ── */
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .03em; color: var(--blue); }
  header h1 span { color: var(--muted); font-weight: 400; }

  .workspace { display: grid; grid-template-columns: 300px 1fr; gap: 14px; padding: 14px 20px 0; }
  .col-left  { display: flex; flex-direction: column; gap: 14px; }
  .col-right { display: flex; flex-direction: column; gap: 14px; }

  /* right column splits into 2 across for control + dashboards */
  .right-top { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* full-width bottom strip */
  .bottom-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px 20px; }

  /* ── cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .card-header { padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .card-body { padding: 14px; }

  /* ── collapsible cards ── */
  .card-collapsible .card-header { cursor: pointer; user-select: none; border-bottom: none; }
  .card-collapsible .card-header:hover { color: var(--text); }
  .card-collapsible.is-open .card-header { border-bottom: 1px solid var(--border); }
  .card-collapsible .card-body { display: none; padding: 0; }
  .card-collapsible.is-open .card-body { display: block; }
  .chevron { margin-left: auto; transition: transform .2s; font-style: normal; }
  .card-collapsible.is-open .chevron { transform: rotate(180deg); }

  /* ── forms ── */
  label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }
  input[type=text], input[type=password] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 7px 10px; outline: none; transition: border-color .15s; }
  input:focus { border-color: var(--blue); }
  input[type=range] { width: 100%; accent-color: var(--blue); }
  .range-row { display: flex; align-items: center; gap: 10px; }

  /* ── buttons ── */
  button { font-family: var(--mono); font-size: 12px; font-weight: 600; border: none; border-radius: 5px; cursor: pointer; padding: 8px 16px; transition: opacity .15s, transform .08s; }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--blue); color: #0d1117; }
  .btn-run     { background: var(--green); color: #0d1117; font-size: 13px; padding: 11px 24px; width: 100%; }
  .btn-sweep   { background: rgba(88,166,255,.12); color: var(--blue); border: 1px solid rgba(88,166,255,.25); font-size: 12px; padding: 11px 16px; width: 100%; }
  .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-sm      { padding: 5px 10px; font-size: 11px; }
  .btn-set     { background: var(--blue); color: #0d1117; font-size: 11px; font-weight: 700; padding: 7px 12px; border-radius: 4px; border: none; cursor: pointer; white-space: nowrap; }
  .btn-set:hover { opacity: .85; }

  /* ── status badge ── */
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; letter-spacing: .06em; }
  .badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .badge-idle    { background: rgba(139,148,158,.12); color: var(--muted); }
  .badge-idle::before { background: var(--muted); }
  .badge-running { background: rgba(210,153,34,.15); color: var(--yellow); }
  .badge-running::before { background: var(--yellow); animation: pulse 1s ease-in-out infinite; }
  .badge-anomaly { background: rgba(63,185,80,.15); color: var(--green); }
  .badge-anomaly::before { background: var(--green); }
  .badge-null    { background: rgba(248,81,73,.12); color: var(--red); }
  .badge-null::before { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── verdict block ── */
  .verdict-block { padding: 14px 16px; border-radius: 6px; font-size: 13px; line-height: 1.75; }
  .verdict-none    { background: rgba(139,148,158,.08); color: var(--muted); }
  .verdict-anomaly { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); color: var(--green); }
  .verdict-null    { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.2); color: var(--red); }
  .verdict-pivot   { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.25); color: var(--yellow); }

  /* ── dashboards ── */
  .dash-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .dash-link { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--blue); text-decoration: none; font-size: 12px; transition: border-color .15s; }
  .dash-link:hover { border-color: var(--blue); }
  .dash-link .dash-type { font-size: 10px; color: var(--muted); margin-left: auto; }

  /* ── terminal ── */
  .terminal { background: #010409; padding: 12px; height: 340px; overflow-y: auto; scroll-behavior: smooth; }
  .terminal pre { white-space: pre-wrap; word-break: break-all; line-height: 1.6; font-size: 12px; color: #c9d1d9; }
  .terminal .line-anomaly { color: var(--green); font-weight: 700; }
  .terminal .line-error   { color: var(--red); }
  .terminal .line-warn    { color: var(--yellow); }
  .terminal .line-verdict { color: var(--purple); font-weight: 700; }
  .terminal .line-section { color: var(--blue); }

  /* ── log viewer ── */
  .log-box { background: #010409; padding: 12px; height: 340px; overflow-y: auto; }
  .log-box pre { white-space: pre-wrap; word-break: break-all; line-height: 1.5; font-size: 11px; color: var(--muted); }
  .log-box .log-error { color: var(--red); }
  .log-box .log-warn  { color: var(--yellow); }
  .log-box .log-info  { color: var(--text); }

  /* ── target picker ── */
  select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 7px 10px; outline: none; transition: border-color .15s; appearance: none; cursor: pointer; }
  select:focus { border-color: var(--blue); }
  select option { background: var(--surface); }
  select optgroup { color: var(--muted); font-size: 11px; }
  .picker-row { display: flex; gap: 6px; align-items: flex-end; margin-top: 6px; }
  .picker-row select { flex: 1; }
  .active-target { font-size: 12px; color: var(--blue); background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.2); border-radius: 4px; padding: 5px 10px; margin-top: 8px; }
  .active-target strong { color: var(--text); }

  /* ── misc ── */
  .row { display: flex; gap: 8px; align-items: center; }
  .flex-1 { flex: 1; }
  .mt-8 { margin-top: 8px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; color: var(--muted); margin-top: 10px; cursor: pointer; }
  .checkbox-row input { accent-color: var(--yellow); width: 14px; height: 14px; cursor: pointer; }
  #save-msg       { font-size: 11px; color: var(--green); opacity: 0; transition: opacity .4s; }
  #save-msg.show  { opacity: 1; }
  #targets-save-msg { font-size: 11px; color: var(--green); opacity: 0; transition: opacity .4s; display: block; margin-top: 6px; text-align: center; }
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>doer <span>/ ndex.us</span></h1>
    <span id="global-badge" class="badge badge-idle">IDLE</span>
  </header>

  <!-- ── top workspace ── -->
  <div class="workspace">

    <!-- left sidebar -->
    <div class="col-left">

      <!-- Target Picker -->
      <div class="card">
        <div class="card-header">Target Picker</div>
        <div class="card-body">
          <label>Primary</label>
          <div class="picker-row">
            <select id="primary-picker"><option value="">Loading…</option></select>
            <button class="btn-set" id="set-primary-btn">Set</button>
          </div>
          <div id="active-primary-display" class="active-target" style="display:none"></div>

          <div class="two-col" style="margin-top:10px">
            <div>
              <label>Peer 1</label>
              <select id="peer0-picker"><option value="">— none —</option></select>
            </div>
            <div>
              <label>Peer 2</label>
              <select id="peer1-picker"><option value="">— none —</option></select>
            </div>
          </div>

          <label style="margin-top:10px">Pivot</label>
          <select id="pivot-picker"><option value="">— none —</option></select>

          <button class="btn-primary btn-sm" id="save-targets-btn" style="width:100%;margin-top:12px;">Save targets</button>
          <span id="targets-save-msg"></span>

          <!-- hidden inputs for compat -->
          <input type="hidden" id="cfg-primary-ticker">
          <input type="hidden" id="cfg-primary-name">
          <input type="hidden" id="cfg-peer0-ticker">
          <input type="hidden" id="cfg-peer1-ticker">
          <input type="hidden" id="cfg-pivot-ticker">
        </div>
      </div>

      <!-- Sprint Settings -->
      <div class="card">
        <div class="card-header">
          <span>Sprint Settings</span>
          <span id="save-msg" style="margin-left:auto">saved ✓</span>
        </div>
        <div class="card-body">
          <label>Spike threshold — <span id="thresh-label">40</span>%</label>
          <input type="range" id="cfg-threshold" min="10" max="100" step="5" value="40">

          <label style="margin-top:10px">Lookback quarters — <span id="quarters-label">8</span></label>
          <input type="range" id="cfg-quarters" min="4" max="16" step="1" value="8">

          <button class="btn-primary btn-sm" id="save-cfg-btn" style="width:100%;margin-top:12px;">Save</button>
        </div>
      </div>

    </div>

    <!-- right area -->
    <div class="col-right">
      <div class="right-top">

        <!-- Sprint Control -->
        <div class="card">
          <div class="card-header">Sprint Control</div>
          <div class="card-body">
            <button class="btn-run" id="run-btn">▶  Run Sprint</button>
            <button class="btn-sweep" id="sweep-btn" style="margin-top:8px;">⟳  Sweep Universe</button>
            <label class="checkbox-row">
              <input type="checkbox" id="force-pivot-cb">
              Force pivot
            </label>
            <hr class="section-divider">
            <div id="verdict-block" class="verdict-block verdict-none">
              No sprint has run yet this session.
            </div>
          </div>
        </div>

        <!-- Reports / Dashboards -->
        <div class="card">
          <div class="card-header">
            <span>Reports</span>
            <button class="btn-ghost btn-sm" id="refresh-dash-btn" style="margin-left:auto;">↻</button>
          </div>
          <div class="card-body" style="padding:10px">
            <div id="dash-list" class="dash-list">
              <span style="color:var(--muted);font-size:12px;">No reports yet — run a sprint first.</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── bottom collapsible strip ── -->
  <div class="bottom-strip">

    <!-- Live Output -->
    <div class="card card-collapsible" id="terminal-card">
      <div class="card-header" onclick="toggleCard('terminal-card')">
        <span>Live Output</span>
        <button class="btn-ghost btn-sm" id="clear-btn" onclick="event.stopPropagation();clearTerminal();" style="margin-left:8px;">clear</button>
        <i class="chevron">▾</i>
      </div>
      <div class="card-body">
        <div class="terminal" id="terminal">
          <pre id="terminal-pre" style="color:var(--muted)">Waiting for sprint run…</pre>
        </div>
      </div>
    </div>

    <!-- Sprint Log -->
    <div class="card card-collapsible" id="log-card">
      <div class="card-header" onclick="toggleCard('log-card')">
        <span>Sprint Log</span>
        <button class="btn-ghost btn-sm" id="refresh-log-btn" onclick="event.stopPropagation();refreshLog();" style="margin-left:8px;">↻</button>
        <i class="chevron">▾</i>
      </div>
      <div class="card-body">
        <div class="log-box" id="log-box">
          <pre id="log-pre" style="color:var(--muted)">Click ↻ to load log…</pre>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

// ── collapsible cards ─────────────────────────────────────────────────────────
function toggleCard(id) {
  document.getElementById(id).classList.toggle('is-open');
}

// auto-expand terminal when a run starts
function expandTerminal() {
  document.getElementById('terminal-card').classList.add('is-open');
}

// ── api helpers ───────────────────────────────────────────────────────────────
const api = {
  get:  (path)       => fetch(path),
  post: (path, body) => fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }),
};

// ── universe / target picker ──────────────────────────────────────────────────
let _universe = [];

async function loadUniverse(cfg) {
  const r = await api.get('/api/universe');
  if (!r.ok) return;
  const { companies } = await r.json();
  _universe = companies;

  const grouped = {};
  for (const c of companies) {
    const g = _inferGroup(c.ticker);
    (grouped[g] = grouped[g] || []).push(c);
  }

  const selectors = ['primary-picker', 'peer0-picker', 'peer1-picker', 'pivot-picker'];
  for (const selId of selectors) {
    const sel = document.getElementById(selId);
    const isMain = selId === 'primary-picker';
    sel.innerHTML = isMain ? '' : '<option value="">— none —</option>';
    for (const [grp, list] of Object.entries(grouped)) {
      const og = document.createElement('optgroup');
      og.label = grp;
      for (const c of list) {
        const opt = document.createElement('option');
        opt.value = c.ticker;
        opt.dataset.name = c.name;
        opt.dataset.capexTag = c.capex_tag || '';
        opt.textContent = `${c.ticker} — ${c.name}`;
        og.appendChild(opt);
      }
      sel.appendChild(og);
    }
  }

  _syncPickerToConfig(cfg);
}

function _inferGroup(ticker) {
  if (['SRPT','CRSP','EDIT','NTLA','BEAM','VERV','SGMO'].includes(ticker)) return 'Gene / Cell Therapy';
  if (['BMRN','ALXN','FOLD','RARE'].includes(ticker)) return 'Rare Disease';
  if (['ROIV','MDGL','RETA'].includes(ticker)) return 'Oncology / Specialty';
  if (['IONS','AKRO','SRRK','ARQT','ARWR','PRAX'].includes(ticker)) return 'RNA / Antisense';
  return 'Other';
}

function _syncPickerToConfig(cfg) {
  const p = cfg.primary || {};
  const peers = cfg.peers || [];
  const piv = cfg.pivot || {};
  _setPickerValue('primary-picker', p.ticker);
  _setPickerValue('peer0-picker', (peers[0] || {}).ticker);
  _setPickerValue('peer1-picker', (peers[1] || {}).ticker);
  _setPickerValue('pivot-picker', piv.ticker);
  _updateActivePrimaryDisplay(p.ticker, p.name);
}

function _setPickerValue(selId, ticker) {
  if (!ticker) return;
  const sel = document.getElementById(selId);
  for (const opt of sel.options) {
    if (opt.value === ticker) { sel.value = ticker; return; }
  }
  const opt = document.createElement('option');
  opt.value = ticker; opt.textContent = ticker; opt.selected = true;
  sel.insertBefore(opt, sel.firstChild);
}

function _updateActivePrimaryDisplay(ticker, name) {
  const el = document.getElementById('active-primary-display');
  if (!ticker) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = `Active: <strong>${ticker}</strong> — ${name || ''}`;
}

function _companyFromPicker(selId) {
  const sel = document.getElementById(selId);
  const ticker = sel.value;
  if (!ticker) return null;
  const found = _universe.find(c => c.ticker === ticker);
  return found || { ticker, name: sel.options[sel.selectedIndex]?.dataset?.name || ticker };
}

function setupTargetPicker() {
  document.getElementById('set-primary-btn').onclick = () => {
    const c = _companyFromPicker('primary-picker');
    if (c) _updateActivePrimaryDisplay(c.ticker, c.name);
  };

  document.getElementById('save-targets-btn').onclick = async () => {
    const primary = _companyFromPicker('primary-picker');
    const peer0   = _companyFromPicker('peer0-picker');
    const peer1   = _companyFromPicker('peer1-picker');
    const pivot   = _companyFromPicker('pivot-picker');

    if (!primary) { alert('Select a primary target first.'); return; }

    const defaultTag = 'PaymentsToAcquirePropertyPlantAndEquipment';
    const body = {
      primary: { ticker: primary.ticker, name: primary.name, type: 'biotech', capex_tag: primary.capex_tag || defaultTag },
      peers: [peer0, peer1].filter(Boolean).map(c => ({ ticker: c.ticker, name: c.name, type: 'biotech', capex_tag: c.capex_tag || defaultTag })),
      pivot: pivot ? { ticker: pivot.ticker, name: pivot.name, type: pivot.capex_tag ? 'software' : 'biotech', capex_tag: pivot.capex_tag || defaultTag } : undefined,
    };

    const r = await api.post('/api/config', body);
    if (r.ok) {
      const msg = document.getElementById('targets-save-msg');
      msg.textContent = 'saved ✓'; msg.style.opacity = 1;
      setTimeout(() => msg.style.opacity = 0, 2000);
      _updateActivePrimaryDisplay(primary.ticker, primary.name);
    } else {
      alert('Save failed — check server logs.');
    }
  };
}

// ── init ──────────────────────────────────────────────────────────────────────
async function init(cfg) {
  applyConfig(cfg);
  await Promise.all([loadUniverse(cfg), refreshDashboards(), refreshLog(), pollStatus()]);
  setupConfigSave();
  setupRunButton();
  setupTargetPicker();
  document.getElementById('refresh-dash-btn').onclick = refreshDashboards;
}

// ── config ────────────────────────────────────────────────────────────────────
function applyConfig(cfg) {
  const p = cfg.primary || {};
  const peers = cfg.peers || [];
  const piv = cfg.pivot || {};
  const sprint = cfg.sprint || {};

  set('cfg-primary-ticker', p.ticker || '');
  set('cfg-primary-name',   p.name   || '');
  set('cfg-peer0-ticker',   (peers[0] || {}).ticker || '');
  set('cfg-peer1-ticker',   (peers[1] || {}).ticker || '');
  set('cfg-pivot-ticker',   piv.ticker || '');

  if (p.ticker) _updateActivePrimaryDisplay(p.ticker, p.name);

  const thresh = Math.round((sprint.spike_threshold || 0.4) * 100);
  document.getElementById('cfg-threshold').value = thresh;
  document.getElementById('thresh-label').textContent = thresh;

  const qtr = sprint.lookback_quarters || 8;
  document.getElementById('cfg-quarters').value = qtr;
  document.getElementById('quarters-label').textContent = qtr;
}

function set(id, val) { document.getElementById(id).value = val; }
function get(id)       { return document.getElementById(id).value.trim(); }

document.getElementById('cfg-threshold').oninput = e =>
  document.getElementById('thresh-label').textContent = e.target.value;
document.getElementById('cfg-quarters').oninput = e =>
  document.getElementById('quarters-label').textContent = e.target.value;

function setupConfigSave() {
  document.getElementById('save-cfg-btn').onclick = async () => {
    const body = {
      sprint: {
        spike_threshold:   parseInt(document.getElementById('cfg-threshold').value) / 100,
        lookback_quarters: parseInt(document.getElementById('cfg-quarters').value),
      },
    };
    const r = await api.post('/api/config', body);
    if (r.ok) {
      const msg = document.getElementById('save-msg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2000);
    }
  };
}

// ── run control ───────────────────────────────────────────────────────────────
function setupRunButton() {
  document.getElementById('run-btn').onclick = async () => {
    const forcePivot = document.getElementById('force-pivot-cb').checked;
    const r = await api.post('/api/run', { force_pivot: forcePivot });
    if (r.status === 409) { alert('Sprint already running.'); return; }
    if (!r.ok) { alert('Failed to start sprint.'); return; }
    clearTerminal(); expandTerminal(); connectSSE(); pollStatus();
  };

  document.getElementById('clear-btn').onclick = clearTerminal;

  document.getElementById('sweep-btn').onclick = async () => {
    const r = await api.post('/api/sweep', { limit: 0 });
    if (r.status === 409) { alert('A run is already in progress.'); return; }
    if (!r.ok) { alert('Failed to start sweep.'); return; }
    clearTerminal(); expandTerminal(); connectSSE(); pollStatus();
  };
}

function clearTerminal() {
  document.getElementById('terminal-pre').innerHTML = '';
  document.getElementById('terminal-pre').style.color = 'var(--text)';
}

function connectSSE() {
  streamOutput();
}

async function streamOutput() {
  clearTerminal();
  const pre = document.getElementById('terminal-pre');
  pre.style.color = 'var(--text)';
  try {
    const resp = await api.get('/api/run/stream');
    if (!resp.ok) return;
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        const raw = part.slice(6).trim();
        if (raw === '[DONE]' || raw === '') continue;
        try { appendTerminalLine(JSON.parse(raw)); } catch { appendTerminalLine(raw); }
      }
    }
  } catch (e) { appendTerminalLine(`[stream error] ${e.message}`); }
}

function appendTerminalLine(line) {
  const pre = document.getElementById('terminal-pre');
  const span = document.createElement('span');
  span.textContent = line + '\n';
  if (line.includes('ANOMALY'))            span.className = 'line-anomaly';
  else if (line.includes('VERDICT'))       span.className = 'line-verdict';
  else if (line.includes('==='))           span.className = 'line-section';
  else if (/error|ERROR/.test(line))       span.className = 'line-error';
  else if (/warn|WARN|WARNING/.test(line)) span.className = 'line-warn';
  pre.appendChild(span);
  document.getElementById('terminal').scrollTop = 99999;
}

// ── status polling ────────────────────────────────────────────────────────────
let _pollTimer = null;

async function pollStatus() {
  clearTimeout(_pollTimer);
  const r = await api.get('/api/run/status');
  if (!r.ok) return;
  const s = await r.json();
  updateBadge(s);
  updateVerdict(s);
  if (s.running) {
    _pollTimer = setTimeout(pollStatus, 2000);
  } else {
    await refreshDashboards();
  }
}

function updateBadge(s) {
  const badge    = document.getElementById('global-badge');
  const runBtn   = document.getElementById('run-btn');
  const sweepBtn = document.getElementById('sweep-btn');
  if (s.running) {
    badge.className = 'badge badge-running'; badge.textContent = 'RUNNING';
    runBtn.disabled = true; runBtn.textContent = '⏳  Running…';
    sweepBtn.disabled = true;
  } else {
    runBtn.disabled = false; runBtn.textContent = '▶  Run Sprint';
    sweepBtn.disabled = false;
    if (s.verdict === 'ANOMALY')       { badge.className = 'badge badge-anomaly'; badge.textContent = 'ANOMALY FOUND'; }
    else if (s.verdict === 'NULL')     { badge.className = 'badge badge-null';    badge.textContent = 'NO ANOMALY'; }
    else                               { badge.className = 'badge badge-idle';    badge.textContent = 'IDLE'; }
  }
}

function updateVerdict(s) {
  const el = document.getElementById('verdict-block');
  if (s.running) {
    el.className = 'verdict-block verdict-pivot';
    el.innerHTML = '⏳ Sprint in progress…';
    return;
  }
  if (!s.verdict && s.exit_code === null) {
    el.className = 'verdict-block verdict-none';
    el.innerHTML = 'No sprint has run yet this session.';
    return;
  }
  const started = s.started_at ? new Date(s.started_at).toLocaleString() : '—';
  if (s.verdict === 'ANOMALY') {
    el.className = 'verdict-block verdict-anomaly';
    el.innerHTML = `<strong>★ ANOMALY FOUND</strong><br>Started: ${started}<br>Proceed to secondary work.`;
  } else if (s.verdict === 'NULL') {
    el.className = 'verdict-block verdict-null';
    el.innerHTML = `<strong>No anomaly found in either target.</strong><br>Started: ${started}`;
  } else if (s.exit_code !== null) {
    el.className = 'verdict-block verdict-pivot';
    el.innerHTML = `Exit code: ${s.exit_code} · Started: ${started}`;
  }
}

// ── dashboards ────────────────────────────────────────────────────────────────
async function refreshDashboards() {
  const r = await api.get('/api/dashboards');
  if (!r.ok) return;
  const { files } = await r.json();
  const el = document.getElementById('dash-list');
  if (!files.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:12px;">No reports yet — run a sprint first.</span>';
    return;
  }
  el.innerHTML = files.map(f => {
    const isReport = f.startsWith('report_') || f.startsWith('deep_');
    const isSweep  = f.startsWith('sweep_');
    const label    = f.replace(/^(dashboard_|report_|sweep_|deep_)/, '').replace('.html', '');
    const typeTag  = isReport ? 'report' : isSweep ? 'sweep' : 'dashboard';
    const icon     = isReport ? '📄' : isSweep ? '🔍' : '📊';
    return `<a class="dash-link" href="/output/${f}" target="_blank">${icon} ${label}<span class="dash-type">${typeTag}</span></a>`;
  }).join('');
}

// ── log viewer ────────────────────────────────────────────────────────────────
async function refreshLog() {
  const r = await api.get('/api/logs?n=150');
  if (!r.ok) return;
  const { lines } = await r.json();
  const pre = document.getElementById('log-pre');
  if (!lines.length) { pre.textContent = '(log is empty)'; return; }
  pre.innerHTML = lines.map(l => {
    const cls  = /ERROR/.test(l) ? 'log-error' : /WARN/.test(l) ? 'log-warn' : 'log-info';
    const safe = l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<span class="${cls}">${safe}</span>`;
  }).join('\n');
  document.getElementById('log-box').scrollTop = 99999;
}

// ── boot ──────────────────────────────────────────────────────────────────────
(async () => {
  const cfg = await api.get('/api/config').then(r => r.json());
  init(cfg);
})();
</script>

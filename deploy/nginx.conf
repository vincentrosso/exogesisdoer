# /etc/nginx/sites-available/doer.ndex.us
# Managed by exogesisdoer deploy — do not edit by hand.

server {
    listen 80;
    listen [::]:80;
    server_name doer.ndex.us;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name doer.ndex.us;

    ssl_certificate     /etc/letsencrypt/live/doer.ndex.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doer.ndex.us/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;

    # Large response bodies (dashboard HTML)
    client_max_body_size 16m;

    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE / streaming: disable buffering
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       3600s;
        proxy_send_timeout       3600s;
        chunked_transfer_encoding on;
    }
}
